<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superadmin — StatementScrub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Inter', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; }
  .logo { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 6px; }
  .logo span { background: linear-gradient(135deg, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 36px; }
  label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  input[type=password] { width: 100%; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; padding: 12px 16px; font-size: 15px; color: #fff; outline: none; transition: border-color 0.2s; }
  input[type=password]:focus { border-color: #6366f1; }
  .btn { width: 100%; margin-top: 20px; padding: 14px; background: linear-gradient(135deg, #6366f1, #0ea5e9); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .btn:hover { opacity: 0.9; }
  .error { background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Statement<span>Scrub</span></div>
  <div class="sub">Superadmin Panel — Private Access</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/superadmin/login">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter superadmin password" autofocus required>
    <button type="submit" class="btn">Enter Panel →</button>
  </form>
</div>
</body>
</html>
