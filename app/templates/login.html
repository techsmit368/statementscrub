{% extends "base.html" %}
{% block title %}Login — StatementScrub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-sky-500 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-sky-200">
        <span class="text-white font-black text-xl">S</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
      <p class="text-slate-400 mt-1">Sign in to your StatementScrub account</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm flex items-center gap-2">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
      <form method="POST" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" required placeholder="you@company.com"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition" />
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 text-white py-3 rounded-xl font-bold hover:opacity-90 transition shadow-md shadow-sky-200 mt-2">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-400 mt-6">
      Don't have an account?
      <a href="/auth/register" class="text-sky-600 font-semibold hover:underline">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
