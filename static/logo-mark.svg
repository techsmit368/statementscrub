<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StatementScrub">
  <defs>
    <linearGradient id="ssTile" x1="4" y1="2" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#4F8DF1"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="ssScan" x1="9" y1="0" x2="33" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="2" y="2" width="44" height="44" rx="12.5" fill="url(#ssTile)"/>
  <rect x="2.5" y="2.5" width="43" height="43" rx="12" stroke="#fff" stroke-opacity="0.18"/>

  <!-- statement document -->
  <rect x="12.5" y="9.5" width="18" height="24" rx="3" fill="#fff"/>
  <rect x="16" y="14.5" width="11" height="2" rx="1" fill="#C7D2FE"/>
  <rect x="16" y="18.6" width="11" height="2" rx="1" fill="#C7D2FE"/>
  <rect x="16" y="22.7" width="7.5" height="2" rx="1" fill="#C7D2FE"/>

  <!-- scan beam sweeping across the statement -->
  <rect x="9" y="27.3" width="24" height="3" rx="1.5" fill="url(#ssScan)"/>
  <rect x="9" y="27.3" width="24" height="3" rx="1.5" fill="#fff" fill-opacity="0.12"/>

  <!-- approval check badge -->
  <circle cx="33" cy="33" r="8" fill="#22C55E" stroke="#fff" stroke-width="2.2"/>
  <path d="M29.6 33.1l2.3 2.3 4.2-4.8" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
